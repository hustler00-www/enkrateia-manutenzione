<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Enkrateia — In manutenzione</title>
<meta name="theme-color" content="#0d0b07">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0d0b07;
    --bg-deep: #070605;
    --parchment: #efe6d3;
    --parchment-dim: #c9bea3;
    --gold: #c9a227;
    --leaf: #5f7a4f;
    --rule: rgba(239,230,211,0.14);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    background: radial-gradient(ellipse 120% 80% at 50% -10%, #16130c 0%, var(--bg) 55%, var(--bg-deep) 100%);
    color: var(--parchment);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 8vh 6vw;
    position:relative;
  }

  /* faint paper grain / vignette */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(239,230,211,0.03), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(95,122,79,0.05), transparent 45%);
    pointer-events:none;
  }

  .frame{
    max-width: 620px;
    width:100%;
    text-align:center;
    position:relative;
    z-index:1;
  }

  .glyph{
    width:54px; height:54px;
    margin: 0 auto 2.2rem;
    opacity:0;
    animation: fade-in 1.1s ease forwards 0.1s;
  }
  .glyph svg{ width:100%; height:100%; display:block; }

  .eyebrow{
    font-family:'Inter', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform:uppercase;
    color: var(--gold);
    opacity:0;
    animation: fade-in 1s ease forwards 0.4s;
    margin-bottom: 1.1rem;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-style:italic;
    font-size: clamp(2rem, 5.6vw, 3.1rem);
    line-height:1.15;
    letter-spacing: -0.01em;
    color: var(--parchment);
    opacity:0;
    animation: fade-in 1.1s ease forwards 0.65s;
  }

  .manuscript{
    margin-top: 1.7rem;
    font-family:'Fraunces', serif;
    font-weight:300;
    font-size: clamp(1rem, 2vw, 1.15rem);
    line-height:1.75;
    color: var(--parchment-dim);
    opacity:0;
    animation: fade-in 1.1s ease forwards 0.9s;
  }

  .manuscript .cursor{
    display:inline-block;
    width: 2px;
    height: 1.05em;
    background: var(--gold);
    margin-left: 2px;
    vertical-align: -0.15em;
    animation: blink 1s steps(1) infinite;
  }

  .rule{
    width: 56px;
    height: 1px;
    background: var(--rule);
    margin: 2.6rem auto;
    opacity:0;
    animation: fade-in 1s ease forwards 1.1s;
  }

  .meta{
    display:flex;
    flex-direction:column;
    gap: 0.5rem;
    opacity:0;
    animation: fade-in 1s ease forwards 1.3s;
  }

  .meta .label{
    font-size:0.68rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color: var(--parchment-dim);
    opacity:0.7;
  }

  .meta .value{
    font-family:'Fraunces', serif;
    font-size: 1rem;
    color: var(--leaf);
  }

  .links{
    margin-top: 2.6rem;
    display:flex;
    gap: 1.6rem;
    justify-content:center;
    flex-wrap:wrap;
    align-items:baseline;
    opacity:0;
    animation: fade-in 1s ease forwards 1.5s;
  }

  .links a, .links button{
    color: var(--parchment-dim);
    text-decoration:none;
    font-size: 0.82rem;
    letter-spacing:0.04em;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
    transition: color 0.25s ease, border-color 0.25s ease;
    background:none;
    border-top:none; border-left:none; border-right:none;
    font-family:inherit;
    cursor:pointer;
  }
  .links a:hover, .links a:focus-visible,
  .links button:hover, .links button:focus-visible{
    color: var(--gold);
    border-color: var(--gold);
  }

  .email-reveal{
    display:block;
    margin-top:0.55rem;
    font-size: 0.82rem;
    color: var(--gold);
    text-decoration:none;
    border-bottom:1px solid rgba(201,162,39,0.4);
    width:fit-content;
    margin-left:auto; margin-right:auto;
  }

  .lang-switch{
    margin-top: 3.2rem;
    display:flex;
    gap: 0.9rem;
    justify-content:center;
    flex-wrap:wrap;
    opacity:0;
    animation: fade-in 1s ease forwards 1.6s;
  }

  .lang-switch button{
    background:none;
    border:1px solid var(--rule);
    color: var(--parchment-dim);
    font-family:'Inter', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform:uppercase;
    padding: 0.4rem 0.75rem;
    border-radius: 999px;
    cursor:pointer;
    transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
  }

  .lang-switch button.active{
    color: var(--bg);
    background: var(--gold);
    border-color: var(--gold);
  }

  .lang-switch button:hover:not(.active), .lang-switch button:focus-visible{
    color: var(--gold);
    border-color: var(--gold);
  }

  footer{
    margin-top: 4rem;
    font-size: 0.72rem;
    color: var(--parchment-dim);
    opacity:0.55;
    letter-spacing:0.04em;
    animation: fade-in 1s ease forwards 1.7s;
    opacity:0;
  }

  @keyframes fade-in{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @keyframes blink{
    50%{ opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; }
    .glyph, .eyebrow, h1, .manuscript, .rule, .meta, .links, footer{ opacity:1 !important; }
  }

  a:focus-visible, button:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }
</style>
</head>
<body>

  <div class="frame">

    <div class="glyph" aria-hidden="true">
      <svg viewBox="0 0 64 64" fill="none">
        <path d="M32 56C32 56 14 48 14 28C14 16 22 8 32 8C42 8 50 16 50 28C50 48 32 56 32 56Z"
              stroke="#5f7a4f" stroke-width="1.4" opacity="0.85"/>
        <path d="M32 10V52" stroke="#5f7a4f" stroke-width="1" opacity="0.55"/>
        <path d="M32 16C28 20 22 22 20 28" stroke="#5f7a4f" stroke-width="0.8" opacity="0.4"/>
        <path d="M32 16C36 20 42 22 44 28" stroke="#5f7a4f" stroke-width="0.8" opacity="0.4"/>
      </svg>
    </div>

    <p class="eyebrow" data-i18n="eyebrow">Enkrateia</p>

    <h1 data-i18n="title">Stiamo scrivendo<br>un nuovo capitolo.</h1>

    <p class="manuscript">
      <span data-i18n="body">La piattaforma è momentaneamente in pausa per un aggiornamento. Torneremo presto, con qualche pagina in più</span><span class="cursor" aria-hidden="true"></span>
    </p>

    <div class="rule"></div>

    <div class="meta">
      <span class="label" data-i18n="statusLabel">Stato</span>
      <span class="value" data-i18n="statusValue">Manutenzione in corso</span>
    </div>

    <div class="links">
      <a href="https://t.me/enkrateiaxyz" data-i18n="telegram">Canale Telegram</a>
      <button type="button" id="emailBtn" data-i18n="writeUs">Scrivici</button>
    </div>
    <a class="email-reveal" id="emailReveal" href="mailto:infoenkrateia@gmail.com" style="display:none;">infoenkrateia@gmail.com</a>

    <div class="lang-switch" id="langSwitch">
      <button type="button" data-lang="it" class="active">IT</button>
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="de">DE</button>
      <button type="button" data-lang="es">ES</button>
      <button type="button" data-lang="fr">FR</button>
    </div>

    <footer data-i18n="footer">© Enkrateia — Il libro che nasce quando ti ascolti.</footer>

  </div>

  <script>
    const translations = {
      it: {
        eyebrow: "Enkrateia",
        title: "Stiamo scrivendo<br>un nuovo capitolo.",
        body: "La piattaforma è momentaneamente in pausa per un aggiornamento. Torneremo presto, con qualche pagina in più",
        statusLabel: "Stato",
        statusValue: "Manutenzione in corso",
        telegram: "Canale Telegram",
        writeUs: "Scrivici",
        footer: "© Enkrateia — Il libro che nasce quando ti ascolti."
      },
      en: {
        eyebrow: "Enkrateia",
        title: "We're writing<br>a new chapter.",
        body: "The platform is temporarily paused for an update. We'll be back soon, with a few more pages",
        statusLabel: "Status",
        statusValue: "Maintenance in progress",
        telegram: "Telegram Channel",
        writeUs: "Write to us",
        footer: "© Enkrateia — The book that's born when you listen to yourself."
      },
      de: {
        eyebrow: "Enkrateia",
        title: "Wir schreiben<br>ein neues Kapitel.",
        body: "Die Plattform ist vorübergehend für ein Update pausiert. Wir sind bald zurück, mit ein paar Seiten mehr",
        statusLabel: "Status",
        statusValue: "Wartungsarbeiten laufen",
        telegram: "Telegram-Kanal",
        writeUs: "Schreib uns",
        footer: "© Enkrateia — Das Buch, das entsteht, wenn du auf dich hörst."
      },
      es: {
        eyebrow: "Enkrateia",
        title: "Estamos escribiendo<br>un nuevo capítulo.",
        body: "La plataforma está pausada temporalmente por una actualización. Volveremos pronto, con algunas páginas más",
        statusLabel: "Estado",
        statusValue: "Mantenimiento en curso",
        telegram: "Canal de Telegram",
        writeUs: "Escríbenos",
        footer: "© Enkrateia — El libro que nace cuando te escuchas."
      },
      fr: {
        eyebrow: "Enkrateia",
        title: "Nous écrivons<br>un nouveau chapitre.",
        body: "La plateforme est temporairement en pause pour une mise à jour. Nous serons bientôt de retour, avec quelques pages de plus",
        statusLabel: "Statut",
        statusValue: "Maintenance en cours",
        telegram: "Canal Telegram",
        writeUs: "Écrivez-nous",
        footer: "© Enkrateia — Le livre qui naît quand on s'écoute."
      }
    };

    function applyLang(lang){
      const dict = translations[lang] || translations.it;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key] !== undefined) el.innerHTML = dict[key];
      });
      document.documentElement.lang = lang;
      document.querySelectorAll('#langSwitch button').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });
    }

    document.getElementById('langSwitch').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-lang]');
      if (!btn) return;
      applyLang(btn.getAttribute('data-lang'));
    });

    document.getElementById('emailBtn').addEventListener('click', () => {
      const reveal = document.getElementById('emailReveal');
      reveal.style.display = reveal.style.display === 'none' ? 'block' : 'none';
    });
  </script>

</body>
</html>
